name: Build RANI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK (Docker buildozer)
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: android debug
          workdir: .
          buildozer_version: stable

      - name: Get version
        id: ver
        run: |
          V=$(grep '^version' buildozer.spec | cut -d= -f2 | tr -d ' ')
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "tag=v${V}-b${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RANI-AI-APK
          path: ${{ steps.buildozer.outputs.filename }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "RANI AI v${{ steps.ver.outputs.version }} — Build ${{ github.run_number }}"
          body: |
            ### RANI AI Mobile App — Auto Build
            **এই APK download করে phone-এ install করুন।**
            - Build: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
          files: ${{ steps.buildozer.outputs.filename }}
          make_latest: true
