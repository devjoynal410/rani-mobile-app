name: Build RANI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle :app:assembleDebug --stacktrace 2>&1 | tail -50

      - name: Rename APK
        run: |
          mkdir -p release
          find app/build/outputs -name "*.apk" -exec ls -lh {} \;
          APK=$(find app/build/outputs -name "*.apk" | head -1)
          cp "$APK" release/RANI-AI.apk
          ls -lh release/RANI-AI.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RANI-AI-APK
          path: release/RANI-AI.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "RANI AI — Build ${{ github.run_number }}"
          body: |
            ## RANI AI Mobile App

            👇 **নিচের link থেকে APK download করুন:**
          files: release/RANI-AI.apk
          make_latest: true
