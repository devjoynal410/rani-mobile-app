name: Build RANI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME/gradle-dist
          echo "$HOME/gradle-dist/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          set -o pipefail
          gradle :app:assembleDebug --stacktrace 2>&1 | tee build_output.txt
          if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "=== LAST 80 LINES OF BUILD LOG ==="
            tail -80 build_output.txt
            exit 1
          fi
          ls -lh app/build/outputs/apk/debug/app-debug.apk

      - name: Release APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "RANI AI Build ${{ github.run_number }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
