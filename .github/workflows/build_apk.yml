name: Build RANI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build APK
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          cat local.properties
          ls $ANDROID_SDK_ROOT/build-tools/
          gradle :app:assembleDebug --info 2>&1 | grep -E "(BUILD|FAILED|error:|Error)" | head -30

      - name: Check APK
        run: |
          find . -name "*.apk" 2>/dev/null | xargs ls -lh 2>/dev/null || echo "No APK"

      - name: Release APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "RANI AI Build ${{ github.run_number }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
