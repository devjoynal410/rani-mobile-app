name: Build RANI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip curl \
            openjdk-17-jdk \
            autoconf automake libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            libbz2-dev \
            libsqlite3-dev \
            portaudio19-dev \
            python3-dev \
            ccache \
            lld
          # libtinfo5 fix for Ubuntu 22
          sudo apt-get install -y libtinfo5 || true

      - name: Set up Java 17
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          java -version

      - name: Install Python build tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.36 virtualenv

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Get version from buildozer.spec
        id: get_version
        run: |
          VERSION=$(grep '^version' buildozer.spec | head -1 | cut -d'=' -f2 | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-build${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build APK (debug)
        run: |
          buildozer -v android debug 2>&1

      - name: Rename APK
        run: |
          APK=$(ls bin/*.apk | head -1)
          mv "$APK" bin/RANI-AI-v${{ steps.get_version.outputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: "RANI AI v${{ steps.get_version.outputs.version }} (Build ${{ github.run_number }})"
          body: |
            ## RANI AI Mobile App
            Auto-built from latest commit.

            ### Install করুন:
            1. নিচের APK download করুন
            2. Phone-এ install করুন (Unknown sources allow করুন)
            3. RANI PC app চালু করুন → mobile app-এ PC IP দিয়ে connect করুন

            **Build:** ${{ github.run_number }}
            **Commit:** ${{ github.sha }}
          files: bin/RANI-AI-v${{ steps.get_version.outputs.version }}.apk
          make_latest: true
