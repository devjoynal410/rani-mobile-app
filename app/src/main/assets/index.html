<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050810">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RANI AI">
<link rel="manifest" href="manifest.json">
<title>RANI AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: #050810;
    color: #e8eaf6;
    font-family: 'Segoe UI', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: #080d18;
    border-bottom: 1px solid #1a2540;
    flex-shrink: 0;
  }
  .logo { font-size: 20px; font-weight: 700; color: #e8406a; letter-spacing: 2px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; transition: background .3s; }
  .status-dot.connected { background: #00d9f5; box-shadow: 0 0 8px #00d9f5; }
  .status-dot.listening { background: #1ef560; box-shadow: 0 0 8px #1ef560; animation: pulse 1s infinite; }
  .status-dot.speaking  { background: #00d9f5; box-shadow: 0 0 8px #00d9f5; animation: pulse 0.6s infinite; }
  .status-dot.thinking  { background: #f5c518; box-shadow: 0 0 8px #f5c518; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .status-text { font-size: 12px; color: #8890aa; flex: 1; }

  /* IP Connect bar */
  .connect-bar {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: #080d18;
    border-bottom: 1px solid #1a2540;
    flex-shrink: 0;
  }
  .connect-bar input {
    flex: 1;
    background: #0d1525;
    border: 1px solid #1e2d50;
    border-radius: 8px;
    color: #e8eaf6;
    padding: 8px 12px;
    font-size: 14px;
    outline: none;
  }
  .connect-bar input:focus { border-color: #e8406a; }
  .btn-connect {
    background: #e8406a;
    border: none;
    border-radius: 8px;
    color: #fff;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-connect:active { opacity: .8; }

  /* Chat */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }
  .bubble.user {
    background: #1e1030;
    border: 1px solid #e8406a44;
    color: #f0c0d0;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .bubble.rani {
    background: #0a1830;
    border: 1px solid #00d9f522;
    color: #c8f0f8;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .bubble.sys {
    background: transparent;
    color: #556;
    font-size: 12px;
    align-self: center;
    font-style: italic;
  }
  .bubble-name {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 4px;
    opacity: .7;
  }

  /* Live text */
  .live-text {
    padding: 8px 16px;
    background: #080d18;
    color: #00d9f5;
    font-size: 13px;
    min-height: 0;
    transition: all .2s;
    flex-shrink: 0;
    border-top: 1px solid #1a2540;
  }
  .live-text:empty { padding: 0; border: none; }

  /* Bottom bar */
  .bottom-bar {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: #080d18;
    border-top: 1px solid #1a2540;
    flex-shrink: 0;
  }
  .text-input {
    flex: 1;
    background: #0d1525;
    border: 1px solid #1e2d50;
    border-radius: 22px;
    color: #e8eaf6;
    padding: 10px 16px;
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 80px;
    overflow-y: auto;
  }
  .text-input:focus { border-color: #00d9f5; }
  .btn-send {
    background: #e8406a;
    border: none;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-send:active { opacity: .8; transform: scale(.95); }
  .btn-mic {
    background: #0d1525;
    border: 2px solid #1e2d50;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }
  .btn-mic.recording {
    background: #e8406a22;
    border-color: #e8406a;
    animation: pulse 1s infinite;
  }
  .btn-mic:active { opacity: .8; }

  /* Scrollbar */
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: #1e2d50; border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">RANI</span>
  <div class="status-dot" id="dot"></div>
  <span class="status-text" id="statusTxt">Not connected</span>
</div>

<div class="connect-bar">
  <input type="text" id="ipInput" placeholder="PC IP Address (e.g. 192.168.1.5)" value="">
  <button class="btn-connect" id="connectBtn" onclick="toggleConnect()">Connect</button>
</div>

<div class="chat-area" id="chat"></div>

<div class="live-text" id="liveTxt"></div>

<div class="bottom-bar">
  <textarea class="text-input" id="msgInput" placeholder="Type message..." rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendText();}"></textarea>
  <button class="btn-send" onclick="sendText()">➤</button>
  <button class="btn-mic" id="micBtn" onclick="toggleMic()">🎤</button>
</div>

<script>
let ws = null;
let connected = false;
let recording = false;
let mediaRecorder = null;
let audioCtx = null;
let micStream = null;
let scriptProcessor = null;
const PORT = 8765;

// ── Load saved IP ────────────────────────────────────────
const savedIP = localStorage.getItem('rani_ip') || '';
document.getElementById('ipInput').value = savedIP;

// ── WebSocket ─────────────────────────────────────────────
function toggleConnect() {
  if (connected) disconnect();
  else connect();
}

function connect() {
  const ip = document.getElementById('ipInput').value.trim();
  if (!ip) { addSys('Enter PC IP address first'); return; }
  localStorage.setItem('rani_ip', ip);
  setStatus('connecting', 'Connecting...');
  document.getElementById('connectBtn').textContent = '...';

  ws = new WebSocket(`ws://${ip}:${PORT}`);

  ws.onopen = () => {
    connected = true;
    setStatus('connected', 'Connected to RANI ✓');
    document.getElementById('connectBtn').textContent = 'Disconnect';
    addSys('RANI-এর সাথে connected!');
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'text') {
      if (msg.final) {
        if (msg.text.trim()) addBubble('rani', msg.text);
        document.getElementById('liveTxt').textContent = '';
      } else {
        document.getElementById('liveTxt').textContent = msg.text;
      }
    } else if (msg.type === 'audio') {
      playAudio(msg.data);
    } else if (msg.type === 'status') {
      handleStatus(msg.state);
    }
  };

  ws.onerror = () => setStatus('error', 'Connection failed');
  ws.onclose = () => {
    connected = false;
    setStatus('disconnected', 'Disconnected');
    document.getElementById('connectBtn').textContent = 'Connect';
  };
}

function disconnect() {
  if (ws) ws.close();
}

// ── Status ────────────────────────────────────────────────
function setStatus(state, text) {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('statusTxt');
  dot.className = 'status-dot';
  if (state === 'connected') dot.classList.add('connected');
  txt.textContent = text;
}

function handleStatus(state) {
  const dot = document.getElementById('dot');
  dot.className = 'status-dot';
  const map = {
    listening: ['listening', '🟢 Listening...'],
    thinking:  ['thinking',  '🟡 Thinking...'],
    speaking:  ['speaking',  '🔵 Speaking...'],
    standby:   ['connected', '✓ Standby'],
  };
  const [cls, txt] = map[state] || ['connected', state];
  dot.classList.add(cls);
  document.getElementById('statusTxt').textContent = txt;
}

// ── Send text ─────────────────────────────────────────────
function sendText() {
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if (!text) return;
  if (!connected) { addSys('First connect to RANI!'); return; }
  inp.value = '';
  inp.style.height = 'auto';
  addBubble('user', text);
  ws.send(JSON.stringify({type: 'text', text}));
}

// ── Mic recording ─────────────────────────────────────────
async function toggleMic() {
  if (!connected) { addSys('First connect to RANI!'); return; }
  if (recording) {
    stopMic();
  } else {
    await startMic();
  }
}

async function startMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true }
    });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    const source = audioCtx.createMediaStreamSource(micStream);
    scriptProcessor = audioCtx.createScriptProcessor(4096, 1, 1);

    scriptProcessor.onaudioprocess = (e) => {
      if (!recording || !connected) return;
      const floatData = e.inputBuffer.getChannelData(0);
      // Convert float32 → int16
      const int16 = new Int16Array(floatData.length);
      for (let i = 0; i < floatData.length; i++) {
        int16[i] = Math.max(-32768, Math.min(32767, floatData[i] * 32767));
      }
      const b64 = arrayBufferToBase64(int16.buffer);
      ws.send(JSON.stringify({type: 'audio', data: b64}));
    };

    source.connect(scriptProcessor);
    scriptProcessor.connect(audioCtx.destination);

    recording = true;
    const btn = document.getElementById('micBtn');
    btn.textContent = '⏹';
    btn.classList.add('recording');
    addSys('Voice started — কথা বলুন');
  } catch (err) {
    addSys('Mic error: ' + err.message);
  }
}

function stopMic() {
  recording = false;
  if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  const btn = document.getElementById('micBtn');
  btn.textContent = '🎤';
  btn.classList.remove('recording');
  addSys('Voice stopped');
}

// ── Audio playback ─────────────────────────────────────────
function playAudio(b64) {
  try {
    const raw = base64ToArrayBuffer(b64);
    const int16 = new Int16Array(raw);
    const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    const buf = ctx.createBuffer(1, int16.length, 16000);
    const channel = buf.getChannelData(0);
    for (let i = 0; i < int16.length; i++) channel[i] = int16[i] / 32768.0;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start();
    src.onended = () => ctx.close();
  } catch (e) {
    console.warn('Audio play error:', e);
  }
}

// ── UI helpers ─────────────────────────────────────────────
function addBubble(who, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `bubble ${who}`;
  const name = who === 'user' ? 'You' : 'RANI';
  div.innerHTML = `<div class="bubble-name">${name}</div>${escHtml(text)}`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addSys(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'bubble sys';
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── Base64 utils ───────────────────────────────────────────
function arrayBufferToBase64(buf) {
  const bytes = new Uint8Array(buf);
  let b = '';
  for (let i = 0; i < bytes.length; i++) b += String.fromCharCode(bytes[i]);
  return btoa(b);
}

function base64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const buf = new ArrayBuffer(bin.length);
  const view = new Uint8Array(buf);
  for (let i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
  return buf;
}

// ── Auto-resize textarea ───────────────────────────────────
document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});
</script>
</body>
</html>
